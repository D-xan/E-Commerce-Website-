<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple E-Commerce Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
        }
        .product-card img {
            max-width: 100%;
            height: auto;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background-color: #218838;
        }
        /* Hidden elements for other "services" to test against */
        #cart-view, #checkout-form, #profile-view {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>SimpleShop</h1>
        <nav>
            <a href="#" onclick="showSection('products')">Home</a>
            <a href="login.html" id="nav-login">Login</a>
            <a href="#" onclick="showSection('profile-view')" id="nav-profile" style="display:none;">Profile</a>
            <a href="#" onclick="showSection('cart-view')">Cart (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <div class="container">
        <!-- Product Service Area -->
        <section id="products" class="products">
            <div class="product-card" id="prod-1">
                <img src="https://via.placeholder.com/150" alt="Product 1">
                <h3>Product 1</h3>
                <p>$19.99</p>
                <button onclick="addToCart(1)">Add to Cart</button>
            </div>
            <div class="product-card" id="prod-2">
                <img src="https://via.placeholder.com/150" alt="Product 2">
                <h3>Product 2</h3>
                <p>$29.99</p>
                <button onclick="addToCart(2)">Add to Cart</button>
            </div>
            <div class="product-card" id="prod-3">
                <img src="https://via.placeholder.com/150" alt="Product 3">
                <h3>Product 3</h3>
                <p>$39.99</p>
                <button onclick="addToCart(3)">Add to Cart</button>
            </div>
        </section>

        <!-- Cart Service Area -->
        <section id="cart-view">
            <h2>Shopping Cart</h2>
            <ul id="cart-items"></ul>
            <button onclick="showSection('checkout-form')">Proceed to Checkout</button>
        </section>

        <!-- Address/Shipping Service Area -->
        <section id="checkout-form">
            <h2>Shipping Address</h2>
            <input type="text" id="address" placeholder="Full Address">
            <input type="text" id="city" placeholder="City">
            <input type="text" id="zip" placeholder="Zip Code">
            <button onclick="submitOrder()">Place Order</button>
        </section>

        <!-- User Profile Area -->
        <section id="profile-view">
            <h2>User Profile</h2>
            <p>Welcome, <span id="user-display-name">User</span>!</p>
            <button onclick="logout()">Logout</button>
        </section>
    </div>

    <script>
        let cart = 0;
        let isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

        // Check if user logged in via the separate login.html page
        window.onload = function() {
            if (isLoggedIn) {
                document.getElementById('nav-login').style.display = 'none';
                document.getElementById('nav-profile').style.display = 'inline';
                document.getElementById('user-display-name').innerText = localStorage.getItem('currentUser') || 'User';
            }
        };

        function showSection(id) {
            ['products', 'cart-view', 'checkout-form', 'profile-view'].forEach(sec => {
                document.getElementById(sec).style.display = 'none';
            });
            document.getElementById(id).style.display = id === 'products' ? 'grid' : 'block';
        }

        function addToCart(id) {
            cart++;
            document.getElementById('cart-count').innerText = cart;
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            isLoggedIn = false;
            document.getElementById('nav-login').style.display = 'inline';
            document.getElementById('nav-profile').style.display = 'none';
            showSection('products');
        }

        function submitOrder() {
            cart = 0;
            document.getElementById('cart-count').innerText = cart;
            showSection('products');
        }
    </script>
</body>
</html>
